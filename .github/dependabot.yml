version: 2
updates:
  - package-ecosystem: "github-actions"
    target-branch: "dev"
    directory: "/"
    schedule:
      interval: "daily"
    # https://blog.yossarian.net/2025/11/21/We-should-all-be-using-dependency-cooldowns
    cooldown:
      default-days: 7

  - package-ecosystem: "uv"
    target-branch: "dev"
    directory: "/"
    allow:
      - dependency-type: "all"
    schedule:
      interval: "daily"
    # https://blog.yossarian.net/2025/11/21/We-should-all-be-using-dependency-cooldowns
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    target-branch: "dev"
    directories: ["/docker/*/"]
    schedule:
      interval: "monthly"
    # https://blog.yossarian.net/2025/11/21/We-should-all-be-using-dependency-cooldowns
    cooldown:
      default-days: 7
