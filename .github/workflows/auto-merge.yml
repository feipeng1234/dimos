name: auto-merge
# Squash-merge a PR automatically once `ci` finishes successfully.
#
# Triggered by `workflow_run`, which fires AFTER the gating `ci` workflow
# (defined in ci.yml) has completed. This guarantees we only act on PRs
# whose CI is genuinely green — there's no race with `ci` still running.
#
# A PR is eligible only if BOTH:
#   (1) it is open and not a draft;
#   (2) either its head branch is from the agent (`agent/*`), or a human
#       has explicitly applied the `auto-merge` label.
#
# Eligibility (2) is the security boundary: `agent/*` branches can only
# come from this repo (the worker has push access), and external
# contributors' PRs need a maintainer to add `auto-merge` before this
# workflow will touch them. Note that `workflow_run` jobs run with the
# permissions of the default branch's workflow file — so even if a
# malicious contributor edits `auto-merge.yml` in their PR, the version
# that runs is the trusted one on `main`.

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions:
  contents: write       # for the merge commit on `main`
  pull-requests: write  # for `gh pr merge`

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Find the open PR for this CI run
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -e
          # `workflow_run` payload lacks the PR number; resolve via the
          # head_sha → open PRs index. Pick the first open one.
          pr_json=$(gh api \
            "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
            --jq '[.[] | select(.state=="open")] | first // empty')
          if [ -z "$pr_json" ] || [ "$pr_json" = "null" ]; then
            echo "No open PR found for sha ${HEAD_SHA}; nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          number=$(echo "$pr_json" | jq -r '.number')
          draft=$(echo "$pr_json"  | jq -r '.draft')
          head=$(echo "$pr_json"   | jq -r '.head.ref')
          labels=$(echo "$pr_json" | jq -r '[.labels[].name] | join(",")')
          echo "Resolved PR #${number} (head=${head}, draft=${draft}, labels=${labels})"
          echo "found=true"          >> "$GITHUB_OUTPUT"
          echo "number=${number}"    >> "$GITHUB_OUTPUT"
          echo "draft=${draft}"      >> "$GITHUB_OUTPUT"
          echo "head=${head}"        >> "$GITHUB_OUTPUT"
          echo "labels=${labels}"    >> "$GITHUB_OUTPUT"

      - name: Decide whether the PR is eligible for auto-merge
        id: decide
        if: steps.find_pr.outputs.found == 'true'
        env:
          DRAFT: ${{ steps.find_pr.outputs.draft }}
          HEAD: ${{ steps.find_pr.outputs.head }}
          LABELS: ${{ steps.find_pr.outputs.labels }}
        shell: bash
        run: |
          set -e
          if [ "${DRAFT}" = "true" ]; then
            echo "PR is draft; skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "${LABELS}" | tr ',' '\n' | grep -qx 'auto-merge'; then
            echo "PR is labeled 'auto-merge'."
            echo "go=true"            >> "$GITHUB_OUTPUT"
            echo "reason=label"       >> "$GITHUB_OUTPUT"
            exit 0
          fi
          case "${HEAD}" in
            agent/*)
              echo "PR head '${HEAD}' is an agent branch."
              echo "go=true"               >> "$GITHUB_OUTPUT"
              echo "reason=agent_branch"   >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "PR is neither labeled 'auto-merge' nor from agent/*; skipping."
          echo "go=false" >> "$GITHUB_OUTPUT"

      - name: Squash-merge the PR
        if: steps.decide.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.find_pr.outputs.number }}
          REASON: ${{ steps.decide.outputs.reason }}
        shell: bash
        run: |
          set -e
          echo "Auto-merging PR #${PR} (reason: ${REASON})"
          # `--delete-branch` cleans up the head branch after merge; the
          # repo already has `delete_branch_on_merge: true` so this is
          # belt-and-suspenders, but explicit beats inferred.
          gh pr merge "${PR}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
