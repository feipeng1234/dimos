name: ci
# Slimmed-down CI for the feipeng1234/dimos fork.
#
# Goals:
#   1. Keep the same `lint` job upstream uses (pre-commit + mypy). It already
#      passes on agent-generated PRs and is the cheapest way to catch real
#      regressions before merge.
#   2. Replace the heavy upstream test matrix (5 Python versions × Ubuntu
#      + 3.14t + 3.15-experimental + md-babel + self-hosted-tests + a
#      cross-job fail-fast watcher + codecov upload) with a single
#      `tests-changed` job that:
#         - Skips entirely when the PR / push touches no `.py` files.
#         - Otherwise maps each changed `.py` to its sibling `test_*.py`
#           and runs ONLY those tests on a single Python version.
#      This is enough to catch regressions in the changed code without
#      burning ~30 min of CI minutes per PR on flake-prone matrix jobs
#      that the fork can't independently fix.
#   3. Drop the `md-babel`, `self-hosted-tests`, `fail-fast`, and codecov
#      jobs entirely — none of them gate merges in this fork's workflow,
#      and self-hosted runners aren't reliably available here.
#
# `ci-complete` is preserved as the branch-protection target so the
# repo's existing required-checks setup still works.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    # Unchanged from upstream. pre-commit covers ruff-format / ruff-check /
    # license headers / doclinks / json+yaml format / largefiles / lfs.
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout
    env:
      UV_NO_SYNC: "1"  # Disable installing default packages on `uv run`

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install lint dependencies
        run: uv sync --only-group lint --frozen
      - name: Mypy
        run: uv run mypy
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  tests-changed:
    # Replaces the upstream `tests` matrix. Single Python (3.11) on
    # ubuntu-latest. Skips itself when no .py files changed; otherwise
    # only runs tests sibling to the changed .py files.
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need history so we can `git diff` against the base ref.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Find changed .py files vs base
        id: changed_py
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --depth=1 origin "${{ github.base_ref }}" 2>/dev/null || true
          else
            base_ref="${{ github.event.before }}"
          fi
          # Empty base (first push to a new branch) → fall back to the
          # parent of HEAD so we still get a sensible diff.
          if ! git rev-parse "$base_ref" >/dev/null 2>&1; then
            base_ref="HEAD~1"
          fi
          git diff --name-only "$base_ref...HEAD" \
            | grep -E '\.py$' \
            > /tmp/changed_py.txt || true
          n=$(wc -l < /tmp/changed_py.txt | tr -d ' ')
          echo "Changed .py count: $n"
          if [ "$n" -gt 0 ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
            cat /tmp/changed_py.txt
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip pytest (no .py changes)
        if: steps.changed_py.outputs.any == 'false'
        run: echo "No Python files changed in this PR; skipping pytest."

      - name: Map .py files to sibling test files
        if: steps.changed_py.outputs.any == 'true'
        id: targets
        shell: bash
        run: |
          targets=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # If the changed file is itself a test, include it directly.
            case "$(basename "$f")" in
              test_*.py|*_test.py)
                [ -f "$f" ] && targets+=("$f")
                continue
                ;;
            esac
            # Otherwise look for a sibling test file in the same dir or
            # a `tests/` subdir.
            dir=$(dirname "$f")
            base=$(basename "$f" .py)
            for cand in \
                "$dir/test_${base}.py" \
                "$dir/${base}_test.py" \
                "$dir/tests/test_${base}.py"; do
              [ -f "$cand" ] && targets+=("$cand")
            done
          done < /tmp/changed_py.txt

          if [ ${#targets[@]} -eq 0 ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No sibling test files mapped from changed .py files."
          else
            uniq=$(printf '%s\n' "${targets[@]}" | sort -u | tr '\n' ' ')
            echo "list=$uniq" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "Will run pytest on:"
            printf ' - %s\n' "${targets[@]}" | sort -u
          fi

      - name: Skip pytest (no test files matched)
        if: steps.changed_py.outputs.any == 'true' && steps.targets.outputs.any != 'true'
        run: echo "Changed .py files have no sibling test_*.py / tests/test_*.py; skipping pytest."

      - name: Install test dependencies
        if: steps.targets.outputs.any == 'true'
        run: uv sync --group tests --frozen

      - name: Run pytest on mapped tests only
        if: steps.targets.outputs.any == 'true'
        # `not (tool or self_hosted or mujoco or slow)` matches the markers
        # `pyproject.toml` excludes by default; we re-state them so that a
        # caller-supplied addopts override doesn't accidentally pull them in.
        run: |
          uv run pytest \
            -x \
            --timeout=120 \
            --no-cov \
            -m 'not (tool or self_hosted or mujoco or slow)' \
            ${{ steps.targets.outputs.list }}

  ci-complete:
    # Branch-protection target. Stays green iff lint AND tests-changed
    # both succeed (or are skipped, which `re-actors/alls-green` treats
    # as success — it's only used for the docs-only PRs that bypass
    # `tests-changed` via the no-.py path above).
    if: always()
    needs:
      - lint
      - tests-changed
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
