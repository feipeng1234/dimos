name: ci
on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'

permissions: {}

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout
    env:
      UV_NO_SYNC: "1"  # Disable installing default packages on `uv run`

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install lint dependencies
        run: uv sync --only-group lint --frozen
      - name: Mypy
        run: uv run mypy
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout
      id-token: write  # For codecov-action's OIDC upload

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
      - name: Install dependency for pyaudio
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev
      - name: Remove git LFS to avoid accidental large downloads
        run: sudo rm -f /usr/bin/git-lfs
      - name: Run tests
        run: uv run pytest --numprocesses=auto --cov=dimos/ --junitxml=junit.xml -m 'not (tool or self_hosted or mujoco)'
      - name: Re-run the failing tests with maximum verbosity
        if: failure()
        env:
          COLOR: yes
        run: >-  # `exit 1` makes sure that the job remains red with flaky runs
          uv run pytest --no-cov -vvvvv --lf  -m 'not (tool or self_hosted or mujoco)' && exit 1
        shell: bash
      - name: Combine coverage from subprocesses
        run: uv run python -m coverage combine
      - name: Turn coverage into xml
        run: uv run python -m coverage xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.xml
          use_oidc: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          report_type: test_results
          use_oidc: true

  self-hosted-tests:
    # Skip on draft PRs and on PRs from forks — the latter would expose the
    # self-hosted runner to untrusted code from external contributors.
    if: |
      github.event_name == 'push' || (
        github.event.pull_request.draft == false &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    env:
      UV_NO_SYNC: "1"  # Disable installing default packages on `uv run`
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, Linux]
            # GitHub Actions only honours `container:` on Linux runners.
            container:
              image: ghcr.io/dimensionalos/ros-dev:dev
              env:
                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
            markers: "self_hosted or skipif_no_ros"
            experimental: false
          - runner: [self-hosted, macos, arm64]
            container: null  # run on host — `container:` is Linux-only
            markers: "self_hosted"
            experimental: true
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read  # For checkout
      packages: read  # For pulling the ros-dev container from ghcr.io
      id-token: write  # For codecov-action's OIDC upload
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          # If we ever allow external PRs on custom runner, persisting credentials
          # could be abused by attackers.
          persist-credentials: false
      - name: Fix permissions
        run: |
          git config --global --add safe.directory '*'
          git clean -ffdx -e .venv
      - name: Install dependencies
        run: uv sync --only-group tests-self-hosted --frozen
      - name: Run tests
        run: uv run pytest --cov=dimos/ --junitxml=junit.xml -m '(${{ matrix.markers }}) and not (tool or mujoco)'
      - name: Re-run the failing tests with maximum verbosity
        if: failure()
        env:
          COLOR: yes
        run: >-  # `exit 1` makes sure that the job remains red with flaky runs
          uv run pytest --no-cov -vvvvv --lf  -m '(${{ matrix.markers }}) and not (tool or mujoco)' && exit 1
        shell: bash
      - name: Combine coverage from subprocesses
        run: uv run python -m coverage combine
      - name: Turn coverage into xml
        run: uv run python -m coverage xml
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.xml
          use_oidc: true
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          report_type: test_results
          use_oidc: true
      - name: Check disk space
        if: failure()
        run: |
          df -h

  ci-complete:  # This is used for branch protection.
    if: always()

    needs:
    - lint
    - tests
    - self-hosted-tests

    runs-on: ubuntu-latest

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
